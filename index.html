<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Couchella 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0d0d0d; font-family: Arial, Helvetica, sans-serif; }
body { display: flex; flex-direction: column; }
.main { flex: 1; display: flex; align-items: center; justify-content: center; }
.wrap { text-align: center; }
h1 { font-size: 32px; font-weight: 500; color: #f0ece4; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
.logo-img { height: 0.75em; vertical-align: middle; filter: invert(1); display: inline-block; }
.sub { font-size: 15px; color: #666; margin-bottom: 36px; }
.festivals { display: flex; gap: 12px; justify-content: center; margin-bottom: 22px; }
.fbtn {
  padding: 9px 26px; border-radius: 22px;
  border: 1px solid #2a2a2a;
  font-size: 15px; font-weight: 500;
  color: #555; background: transparent;
  cursor: pointer; font-family: inherit;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.fbtn.active { border-color: #f0ece4; color: #f0ece4; background: rgba(240,236,228,.05); }
.fbtn:hover:not(.active) { border-color: #444; color: #888; }
.weekends { display: flex; gap: 16px; justify-content: center; margin-bottom: 36px; }
.wbtn {
  padding: 12px 40px; border-radius: 12px;
  border: 1.5px solid #2a2a2a;
  font-size: 17px; font-weight: 500;
  color: #555; background: transparent;
  cursor: pointer; font-family: inherit;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.wbtn .wd { display: block; font-size: 13px; font-weight: 400; margin-top: 5px; opacity: 0.7; }
.wbtn.active { border-color: #f0ece4; color: #f0ece4; background: rgba(240,236,228,.05); }
.wbtn:hover:not(.active) { border-color: #444; color: #888; }
.days { display: flex; gap: 28px; justify-content: center; }
.btn {
  display: block; text-decoration: none;
  padding: 28px 52px; border-radius: 14px;
  border: 1.5px solid; font-size: 26px; font-weight: 500;
}
.btn:hover { opacity: 0.75; }
.btn .d { display: block; font-size: 14px; font-weight: 400; margin-top: 6px; opacity: 0.65; }
.fri { color: #5fad8c; border-color: #5fad8c; background: rgba(95,173,140,.08); }
.sat { color: #5591cc; border-color: #5591cc; background: rgba(85,145,204,.08); }
.sun { color: #a07cd0; border-color: #a07cd0; background: rgba(160,124,208,.08); }

@media (max-width: 600px) {
  h1 { font-size: 22px; }
  .sub { font-size: 13px; margin-bottom: 28px; }
  .festivals { gap: 8px; margin-bottom: 18px; }
  .fbtn { padding: 8px 18px; font-size: 14px; }
  .weekends { flex-direction: column; gap: 10px; align-items: stretch; margin-bottom: 28px; }
  .wbtn { padding: 14px 20px; font-size: 15px; }
  .days { flex-direction: column; gap: 12px; align-items: stretch; }
  .btn { padding: 22px 28px; font-size: 22px; }
  .btn .d { font-size: 13px; }
}
</style>
</head>
<body>
<div class="main">
  <div class="wrap">
    <h1 id="festival-h1"><img src="coachella-logo.svg" alt="Coachella" class="logo-img"> 2026 &mdash; Livestream</h1>
    <div class="sub" id="sub">April 10&ndash;12, 2026</div>
    <div class="festivals">
      <button class="fbtn active" id="coa-fbtn" onclick="setFestival('coachella')">Coachella</button>
      <button class="fbtn" id="sta-fbtn" onclick="setFestival('stagecoach')">Stagecoach</button>
    </div>
    <div class="weekends" id="weekends-row">
      <button class="wbtn active" id="w1btn" onclick="setWeekend(1)">Weekend 1<span class="wd">Apr 10&ndash;12</span></button>
      <button class="wbtn" id="w2btn" onclick="setWeekend(2)">Weekend 2<span class="wd">Apr 17&ndash;19</span></button>
    </div>
    <div class="days">
      <a class="btn fri" id="fri-btn" href="friday.html">Friday<span class="d">April 10</span></a>
      <a class="btn sat" id="sat-btn" href="saturday.html">Saturday<span class="d">April 11</span></a>
      <a class="btn sun" id="sun-btn" href="sunday.html">Sunday<span class="d">April 12</span></a>
    </div>
  </div>
</div>
<script>
var WEEKS = {
  1: { fri:['friday.html','April 10'], sat:['saturday.html','April 11'], sun:['sunday.html','April 12'], sub:'April 10\u201312, 2026' },
  2: { fri:['friday.html?w=2','April 17'], sat:['saturday.html?w=2','April 18'], sun:['sunday.html?w=2','April 19'], sub:'April 17\u201319, 2026' }
};
var STAGECOACH = {
  fri:['stagecoach-friday.html','April 24'],
  sat:['stagecoach-saturday.html','April 25'],
  sun:['stagecoach-sunday.html','April 26'],
  sub:'April 24\u201326, 2026'
};
function setWeekend(n) {
  localStorage.setItem('weekend', n);
  var w = WEEKS[n];
  document.getElementById('w1btn').classList.toggle('active', n === 1);
  document.getElementById('w2btn').classList.toggle('active', n === 2);
  [['fri-btn', w.fri], ['sat-btn', w.sat], ['sun-btn', w.sun]].forEach(function(p) {
    var el = document.getElementById(p[0]);
    el.href = p[1][0];
    el.querySelector('.d').textContent = p[1][1];
  });
  document.getElementById('sub').innerHTML = w.sub;
}
function setFestival(f) {
  localStorage.setItem('festival', f);
  document.getElementById('coa-fbtn').classList.toggle('active', f === 'coachella');
  document.getElementById('sta-fbtn').classList.toggle('active', f === 'stagecoach');
  var weekendsRow = document.getElementById('weekends-row');
  var h1 = document.getElementById('festival-h1');
  if (f === 'stagecoach') {
    weekendsRow.style.display = 'none';
    h1.innerHTML = 'Stagecoach 2026 &mdash; Livestream';
    document.title = 'Stagecoach 2026';
    document.getElementById('sub').innerHTML = STAGECOACH.sub;
    [['fri-btn', STAGECOACH.fri], ['sat-btn', STAGECOACH.sat], ['sun-btn', STAGECOACH.sun]].forEach(function(p) {
      var el = document.getElementById(p[0]);
      el.href = p[1][0];
      el.querySelector('.d').textContent = p[1][1];
    });
  } else {
    weekendsRow.style.display = '';
    h1.innerHTML = '<img src="coachella-logo.svg" alt="Coachella" class="logo-img"> 2026 &mdash; Livestream';
    document.title = 'Couchella 2026';
    var saved = localStorage.getItem('weekend');
    setWeekend(saved === '2' ? 2 : 1);
  }
}
(function() {
  var savedFest = localStorage.getItem('festival');
  if (savedFest === 'stagecoach') { setFestival('stagecoach'); return; }
  var saved = localStorage.getItem('weekend');
  var w = saved ? parseInt(saved) : (function() {
    var n = new Date(), d = n.getFullYear()*10000 + (n.getMonth()+1)*100 + n.getDate();
    return d >= 20260414 ? 2 : 1;
  })();
  if (w === 2) setWeekend(2);
})();
</script>
</body>
</html>
